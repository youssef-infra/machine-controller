apiVersion: v1
kind: Secret
metadata:
  name: vpcloud-credentials
  namespace: default
type: Opaque
data:
  # Option A (Gardener SecretBinding flow): Pre-obtained bearer token
  apiToken: ""

  # Option B (existing machine-controller compatibility): SSO credentials
  # username: ""    # Base64-encoded SSO username
  # password: ""    # Base64-encoded SSO password

  # Base64-encoded cloud-init user data (injected by Gardener MCM)
  userData: ""
