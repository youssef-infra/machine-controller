apiVersion: machine.sapcloud.io/v1alpha1
kind: MachineClass
metadata:
  name: vpcloud-standard-4-8
  namespace: default
providerSpec:
  apiVersion: mcm.gardener.cloud/v1alpha1
  apiEndpoint: "https://compute.cloud.vptech.eu"
  accountCode: "<account-uuid>"
  imageCode: "<ubuntu-22.04-image-uuid>"
  zone: "fr1"
  cpu: 4
  memory: 8
  mainVolumeSize: 50
  cpuCos: 2              # 1=besteffort, 2=standard, 3=priority
  cpuMake: "intel"       # or "amd"
  # sshKey: ""           # Optional: SSH public key to inject
  # availabilityGroup: "" # Optional: HA placement group
  networks:
    - subnetCode: "<subnet-uuid>"
      order: 0
secretRef:
  name: vpcloud-credentials
  namespace: default
